name: caduceus
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pytorch>=2.1
  - pytorch-cuda=11.8
  - pip
  - pip:
      - transformers>=4.38,<4.46
      - accelerate>=0.30
      - genomic-benchmarks>=0.0.9
      - datasets>=2.14
      - huggingface_hub>=0.19
      - scikit-learn>=1.3
      - pandas>=2.0
      - pyyaml>=6.0
      - tqdm>=4.66
      - numpy>=1.24
      # GPU-only Mamba kernels for the official forward pass:
      - mamba-ssm>=1.2
      - causal-conv1d>=1.2
