version: "3.8"

services:
  train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../configs:/workspace/configs
      - ../results:/workspace/results
      - ../checkpoints:/workspace/checkpoints
    command: ["python", "train.py", "--config", "configs/config.yaml"]

  notebook:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../notebooks:/workspace/notebooks
      - ../configs:/workspace/configs
      - ../results:/workspace/results
    ports:
      - "8888:8888"
    command: >
      bash -c "pip install jupyter && jupyter notebook --ip=0.0.0.0 --port=8888
      --no-browser --allow-root --notebook-dir=/workspace/notebooks"
