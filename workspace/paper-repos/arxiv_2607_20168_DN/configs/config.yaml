# Config for reproducing:
# "Quantum Kernels and the Cross-Section of Stock Returns: Anatomy of a Vanishing Advantage"
# arXiv:2607.20168 (Junchi Shen, July 2026)
#
# Values annotated with SIR confidence. `# ASSUMED: <basis>` marks values not
# explicitly stated in the paper (SIR confidence < 0.7) -- see
# sir-registry/arxiv_2607_20168/sir.json -> implementation_assumptions[] / ambiguities[].

data:
  characteristics_main_study: 27          # SIR confidence 0.9 (Table 1)
  characteristics_diagnostic_study: 31     # SIR confidence 0.9 (Sec 3.1: +4 from 2020)
  winsorize_sigma: 3
  raw_data_start: "2010-01-01"
  raw_data_end: "2026-03-31"
  data_dir: "data/"

universe:
  point_in_time:
    trailing_coverage_days: 252
    coverage_threshold: 0.90
    pool_size: 450
    mktcap_window_days: 20
  static_screen:
    pool_size: 450
    screening_period: "2020-2025"        # ASSUMED: paper says "full 2020-2025 sample" -- exact cutoff dates not given, confidence 0.75

walk_forward:
  training_window_days: 252
  rebalance_frequency_days: 20
  cross_section_sample_every_n_days: 3
  main_study_windows: 170                 # SIR confidence 0.9
  diagnostic_study_windows: 60             # SIR confidence 0.9
  main_study_period: "2012-2025"
  diagnostic_study_period: "2021-2025"

feature_selection:
  active_set_ic_threshold: 0.015
  active_set_min_size: 6
  top8_size: 8

quantum:
  num_qubits: 8
  repetitions_R: 2
  entanglement: "ring"                     # nearest-neighbor, indices mod n -- SIR confidence 0.9
  hq_gate_interpretation: "hadamard_conjugated_rz"   # ASSUMED: SIR ambiguities[0], confidence 0.6 -- H_q undefined in paper Eq.(1). See src/qkernel_finance/quantum/feature_map.py docstring.
  bandwidth_grid_production: [0.05, 0.1, 0.2, 0.4]
  bandwidth_grid_widened: [0.01, 0.05, 0.1, 0.2, 0.4, 0.8, 1.2, 1.6]   # ASSUMED: paper states 8 points spanning [0.01,1.6] and names 0.01/0.2/0.4/0.8/1.6 explicitly; the remaining 3 interior points are our interpolation, confidence 0.5
  gamma_projected_kernel_grid: [0.05, 0.1, 0.2, 0.4]   # ASSUMED: SIR ambiguities[1], confidence 0.5 -- no tuning grid stated for gamma in the paper; reusing the lambda grid as a placeholder
  simulator: "default.qubit"               # PennyLane exact statevector, no hardware/noise

krr:
  alpha_grid: [0.001, 0.01, 0.1, 1.0]       # SIR confidence 0.92
  subsample_size_N: 1536                    # SIR confidence 0.88
  subsample_stratification: "by_date"       # ASSUMED: SIR ambiguities[3], confidence 0.55
  nystrom_landmark_count: 1536
  nystrom_formula: "standard_williams_seeger_2001"  # ASSUMED: SIR ambiguities[2], confidence 0.55

classical_baselines:
  ridge_alpha: 10.0
  xgboost:
    n_estimators: 150
    max_depth: 3
    learning_rate: 0.05
  mlp_hidden_dims: [64, 32]
  nn3_hidden_dims: [32, 16, 8]
  nn3_ensemble_seeds: 3
  nn3_optimizer: "adam"          # ASSUMED: not stated in paper, confidence 0.5
  nn3_learning_rate: 0.001       # ASSUMED: not stated in paper, confidence 0.5
  nn3_max_epochs: 200            # ASSUMED: not stated in paper, confidence 0.4
  early_stopping_patience: 20    # ASSUMED: not stated in paper

evaluation:
  metrics: ["mean_ic", "icir", "t_stat", "hit_rate", "sharpe", "max_drawdown"]
  significance_tests: ["paired_t", "wilcoxon"]
  multiplicity_correction: "holm"
  geometry_diagnostic_subset_size: 400
  geometry_lambda_g: 0.000001
  portfolio:
    top_pct: 0.30
    weighting: "equal"
    rebalance_days: 20
    one_way_cost_bp: 23

hardware:
  device: "cpu_only"       # quantum simulation + classical models are all CPU-tractable at this scale (n=8 qubits, N<=37800)
  precision: "float32"
  num_workers: 4

debug:
  num_windows: 3          # used only with --debug: run a handful of synthetic windows for a fast smoke test
  subsample_size_N: 32
