version: "3.8"

services:
  study:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../data:/workspace/data
      - ../results:/workspace/results
    command: ["python", "run_study.py", "--config", "configs/config.yaml", "--study", "main", "--debug"]

  notebook:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../notebooks:/workspace/notebooks
      - ../data:/workspace/data
    ports:
      - "8888:8888"
    command: >
      bash -c "pip install --no-cache-dir jupyterlab &&
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root"
