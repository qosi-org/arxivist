# Config for reproducing:
# "Approximating SPR Distance Between Phylogenetic Trees with Graph Neural Networks"
# arXiv:2607.18311 (Castanheira, Bugalho, Vaz)
#
# Values annotated with SIR confidence. `# ASSUMED: <basis>` marks values not
# explicitly stated in the paper (SIR confidence < 0.7) — see
# sir-registry/arxiv_2607_18311/sir.json -> implementation_assumptions[] for detail.

model:
  node_feature_dim_continuous: 3     # degree, is_leaf, root_distance -- SIR confidence 0.95
  species_embedding_dim: 16          # SIR confidence 0.9
  num_gin_layers: 2                  # ASSUMED: body text says 2, Fig.5 diagrams 3 -- SIR confidence 0.6
  gin_hidden_dim: 128                # SIR confidence 0.9 (Sec 4.2)
  mlp_head_dims: [256, 128, 64, 1]   # SIR confidence 0.85
  dropout: 0.3                       # SIR confidence 0.9

training:
  optimizer: adam                    # SIR confidence 0.9 (Sec 4.3)
  learning_rate: 0.0001              # SIR confidence 0.9
  weight_decay: 0.0001               # SIR confidence 0.9
  adam_beta1: 0.9                    # ASSUMED: PyTorch default, not stated in paper -- SIR confidence 0.55
  adam_beta2: 0.999                  # ASSUMED: PyTorch default, not stated in paper -- SIR confidence 0.55
  lr_scheduler: reduce_on_plateau    # SIR confidence 0.85
  lr_patience: 10                    # SIR confidence 0.85 (halve LR after 10 epochs no improvement)
  lr_factor: 0.5
  early_stopping_patience: 25        # SIR confidence 0.85
  max_epochs: 200                    # ASSUMED: not stated in paper, bounded by early stopping -- SIR confidence 0.4
  batch_size: 32                     # ASSUMED: not stated in paper -- SIR confidence 0.3
  huber_delta: 1.0                   # ASSUMED: PyTorch nn.HuberLoss default, not stated in paper -- SIR confidence 0.5
  seed: 42                           # SIR confidence 0.9 (Sec 4.3 "fixed seed")
  clamp_min: 0.0                     # SIR confidence 0.9 (negative SPR distances are biologically meaningless)
  log_every_n_steps: 10
  save_every_n_epochs: 5
  deterministic: false               # set true for full determinism (slower)

data:
  train_val_test_split: [0.70, 0.15, 0.15]   # SIR confidence 0.9
  split_seed: 42
  data_dir: "data/"
  master_pairs_csv: "data/master_pairs.csv"
  dataset_source: "Zenodo DOI 10.5281/zenodo.20476872"
  species: ["Clostridium", "Salmonella", "Vibrio", "Streptococcus_pneumoniae"]
  num_workers: 4

evaluation:
  metrics: ["mae", "rmse", "mape", "r2"]
  regimes: ["in_distribution", "cross_species", "size_extrapolation"]
  cross_validation:
    enabled: true
    stratified: true
    n_folds: 5   # ASSUMED: paper reports mean +/- std under "stratified cross-validation" but does not give fold count -- SIR gap, not in ambiguities[] but treat as low confidence

hardware:
  device: "cuda_if_available_else_cpu"
  precision: "float32"
  num_workers: 4
