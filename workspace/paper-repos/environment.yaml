name: arxivist_artemis
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch=2.2.*
  - pytorch-cuda=11.8
  - numpy=1.26.*
  - pandas=2.2.*
  - scipy=1.12.*
  - matplotlib=3.8.*
  - scikit-learn=1.4.*
  - pyyaml=6.0.*
  - pip
  - pip:
      - torchsde==0.2.*
      - transformers==4.4*
      - cvxpylayers==0.1.*
      - cvxpy==1.4.*
      - arch==6.3.*
      - ruptures==1.1.*
      - pytest==8.*
      - pytest-cov==5.*
      - black==24.*
      - ruff==0.4.*
      - mypy==1.*
