# DNAGPT reproduction config — GSR (genomic signal & region) fine-tuning (Sec 4.1)
#
# Builds the from-scratch DNAGPT and fine-tunes the classification head on a GSR
# task (PAS/TIS). If the official .pth is present (data/download.py), it is loaded
# via from_pretrained; otherwise the model trains from scratch (lower accuracy).

model:
  variant: "M"                       # H | M | S-512 | B-512  (M = 0.1B, 9-species)
  ckpt_path: "checkpoints/dna_gpt0.1b_m.pth"   # official weights (optional)
  k: 6                               # non-overlapping k-mer size
  # dims are derived from `variant` (Fig S3); no need to set n_layer/hidden here.

training:
  optimizer: "adamw"
  # NOTE: the paper's 3e-5 is for fine-tuning a model whose head is ALREADY trained.
  # Here the classification head starts fresh, so a higher LR fits it better. Empirically
  # 3e-5 plateaus at ~0.80 acc by epoch 6-8 (proven over 20 epochs). 1e-4 gives the fresh
  # head more room. To match the paper's exact recipe, set lr: 3.0e-5.
  lr: 1.0e-4
  weight_decay: 0.1                  # 1e-1 (Fig S4)
  beta1: 0.9
  beta2: 0.98                        # ASSUMED: Fig S3 betas (0.9, 0.98); 'momentum' ignored
  batch_size: 8                      # Fig S4
  epochs: 12                         # ~paper's 10 (longer doesn't help — training converges by ~ep6)
  scheduler: "cosine_warmup"
  warmup_epochs: 3                   # cosine with warmup (Fig S4)
  grad_clip: 1.0
  early_stopping_patience: 4

data:
  task: "human_pas_aataaa"           # paper DNAGPT-M: 91.51% acc / 82.99 MCC (Table S2)
  data_dir: "data/"
  max_len: 606                       # PAS = 300bp + 300bp flanks + motif removed

evaluation:
  metric: "accuracy"
  split: "test"

hardware:
  device: "auto"
  num_workers: 2
  seed: 42
  deterministic: false
